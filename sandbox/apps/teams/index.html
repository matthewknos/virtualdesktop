<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Microsoft Teams</title>
<style>
  :root {
    --teams-bg: #1f1f1f;
    --teams-sidebar: #2d2d2d;
    --teams-rail: #1a1a1a;
    --teams-border: #3e3e3e;
    --teams-hover: #3e3e3e;
    --teams-active: #3e3e3e;
    --teams-accent: #5b5fc7;
    --teams-accent-hover: #4f52b3;
    --teams-text: #fff;
    --teams-text-secondary: #adadad;
    --teams-text-tertiary: #8e8e8e;
    --teams-msg-own: #3e3e3e;
    --teams-msg-other: #2d2d2d;
    --teams-composer-bg: #2d2d2d;
    --teams-input-bg: #1f1f1f;
    --teams-reaction-bg: #3e3e3e;
    --teams-green: #92c353;
    --teams-red: #d13438;
    --teams-yellow: #ffc107;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    background: var(--teams-bg);
    color: var(--teams-text);
    height: 100vh;
    display: flex;
    overflow: hidden;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Left rail (icon nav) ── */
  .rail {
    width: 48px;
    background: var(--teams-rail);
    border-right: 1px solid var(--teams-border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    gap: 4px;
    flex-shrink: 0;
  }
  .rail-btn {
    width: 40px; height: 40px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--teams-text-secondary);
    transition: all .15s;
    position: relative;
  }
  .rail-btn:hover { background: var(--teams-hover); color: var(--teams-text); }
  .rail-btn.active { background: var(--teams-active); color: var(--teams-accent); }
  .rail-btn svg { width: 20px; height: 20px; }
  .rail-badge {
    position: absolute; top: 4px; right: 4px;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--teams-red);
  }

  /* ── Left panel (teams / chat list) ── */
  .sidebar {
    width: 260px;
    background: var(--teams-sidebar);
    border-right: 1px solid var(--teams-border);
    display: flex; flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 14px 16px 10px;
    font-weight: 600; font-size: 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-search {
    padding: 0 12px 10px;
  }
  .sidebar-search input {
    width: 100%; padding: 6px 10px;
    border-radius: 4px; border: 1px solid var(--teams-border);
    background: var(--teams-bg); color: var(--teams-text);
    font-size: 13px; outline: none;
  }
  .sidebar-search input::placeholder { color: var(--teams-text-tertiary); }
  .sidebar-scroll { flex: 1; overflow-y: auto; padding: 0 4px 8px; }
  .sidebar-section {
    margin-top: 8px;
  }
  .section-title {
    padding: 6px 12px;
    font-size: 11px; font-weight: 600;
    text-transform: uppercase;
    color: var(--teams-text-secondary);
    letter-spacing: 0.5px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .section-title svg { width: 12px; height: 12px; transition: transform .15s; }
  .section-title.collapsed svg { transform: rotate(-90deg); }

  /* Team row */
  .team-row { padding: 2px 4px; }
  .team-header {
    padding: 6px 8px;
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 13px;
    user-select: none;
  }
  .team-header:hover { background: var(--teams-hover); }
  .team-header svg { width: 12px; height: 12px; transition: transform .15s; color: var(--teams-text-secondary); }
  .team-header.collapsed svg { transform: rotate(-90deg); }
  .team-icon { width: 24px; height: 24px; border-radius: 4px; background: var(--teams-accent); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }

  /* Channel row */
  .channel-list { padding-left: 8px; }
  .channel-row {
    padding: 5px 8px 5px 28px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; gap: 8px;
    color: var(--teams-text-secondary);
  }
  .channel-row:hover { background: var(--teams-hover); color: var(--teams-text); }
  .channel-row.active { background: var(--teams-active); color: var(--teams-text); }
  .channel-row svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* Chat row */
  .chat-row {
    padding: 8px 12px;
    border-radius: 4px;
    cursor: pointer;
    display: flex; align-items: center; gap: 10px;
  }
  .chat-row:hover { background: var(--teams-hover); }
  .chat-row.active { background: var(--teams-active); }
  .chat-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--teams-accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    flex-shrink: 0; position: relative;
  }
  .chat-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
  .presence-dot {
    position: absolute; bottom: 1px; right: 1px;
    width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid var(--teams-sidebar);
  }
  .presence-available { background: var(--teams-green); }
  .presence-busy { background: var(--teams-red); }
  .presence-away { background: var(--teams-yellow); }
  .presence-dnd { background: var(--teams-red); }
  .presence-offline { background: #8e8e8e; }
  .chat-info { flex: 1; min-width: 0; }
  .chat-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-preview { font-size: 12px; color: var(--teams-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .chat-time { font-size: 11px; color: var(--teams-text-tertiary); flex-shrink: 0; }

  /* ── Main area ── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .main-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--teams-border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-title { font-weight: 600; font-size: 16px; }
  .header-subtitle { font-size: 12px; color: var(--teams-text-secondary); margin-top: 2px; }
  .header-actions { display: flex; gap: 8px; }
  .header-btn {
    width: 32px; height: 32px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--teams-text-secondary);
  }
  .header-btn:hover { background: var(--teams-hover); color: var(--teams-text); }

  /* Messages */
  .messages {
    flex: 1; overflow-y: auto;
    padding: 16px 20px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .msg-date {
    text-align: center; font-size: 11px; color: var(--teams-text-tertiary);
    margin: 12px 0 4px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .msg-row {
    display: flex; gap: 10px;
    padding: 4px 8px;
    border-radius: 6px;
    position: relative;
  }
  .msg-row:hover { background: rgba(255,255,255,0.03); }
  .msg-row.own { flex-direction: row-reverse; }
  .msg-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--teams-accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    flex-shrink: 0; cursor: pointer;
  }
  .msg-content { max-width: 70%; min-width: 0; }
  .msg-row.own .msg-content { text-align: right; }
  .msg-name { font-weight: 600; font-size: 12px; margin-bottom: 2px; color: var(--teams-text); }
  .msg-time { font-size: 11px; color: var(--teams-text-tertiary); margin-left: 6px; font-weight: 400; }
  .msg-bubble {
    background: var(--teams-msg-other);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px; line-height: 1.45;
    word-wrap: break-word;
    display: inline-block;
    text-align: left;
  }
  .msg-row.own .msg-bubble { background: var(--teams-msg-own); }
  .msg-reactions {
    display: flex; gap: 4px; margin-top: 4px;
  }
  .msg-row.own .msg-reactions { justify-content: flex-end; }
  .reaction {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 6px; border-radius: 10px;
    background: var(--teams-reaction-bg);
    font-size: 11px; cursor: pointer;
    border: 1px solid transparent;
    user-select: none;
  }
  .reaction:hover { border-color: var(--teams-border); }
  .reaction.me { background: var(--teams-accent); color: #fff; }
  .reaction-add {
    opacity: 0; padding: 2px 4px; border-radius: 10px; cursor: pointer;
    font-size: 11px; color: var(--teams-text-secondary);
  }
  .msg-row:hover .reaction-add { opacity: 1; }
  .reaction-add:hover { background: var(--teams-hover); }

  /* Composer */
  .composer {
    padding: 12px 20px 16px;
    border-top: 1px solid var(--teams-border);
    flex-shrink: 0;
  }
  .composer-box {
    background: var(--teams-composer-bg);
    border-radius: 8px;
    border: 1px solid var(--teams-border);
    display: flex; flex-direction: column;
  }
  .composer-box:focus-within { border-color: var(--teams-accent); }
  .composer-input {
    padding: 10px 14px;
    background: transparent; border: none; outline: none;
    color: var(--teams-text); font-size: 14px; line-height: 1.45;
    resize: none; min-height: 40px; max-height: 120px;
    font-family: inherit;
  }
  .composer-input::placeholder { color: var(--teams-text-tertiary); }
  .composer-toolbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 8px 8px;
  }
  .composer-tools { display: flex; gap: 2px; }
  .tool-btn {
    width: 28px; height: 28px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--teams-text-secondary);
    border: none; background: transparent;
  }
  .tool-btn:hover { background: var(--teams-hover); color: var(--teams-text); }
  .send-btn {
    padding: 4px 14px; border-radius: 4px;
    background: var(--teams-accent); color: #fff;
    border: none; font-size: 13px; font-weight: 600;
    cursor: pointer; display: flex; align-items: center; gap: 4px;
  }
  .send-btn:hover { background: var(--teams-accent-hover); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Loading / empty */
  .loading { padding: 20px; text-align: center; color: var(--teams-text-secondary); font-size: 13px; }
  .empty { padding: 40px; text-align: center; color: var(--teams-text-tertiary); font-size: 13px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #777; }

  /* Right panel (members) */
  .right-panel {
    width: 240px; background: var(--teams-sidebar);
    border-left: 1px solid var(--teams-border);
    flex-shrink: 0; display: none; flex-direction: column;
  }
  .right-panel.open { display: flex; }
  .right-header {
    padding: 14px 16px 10px;
    font-weight: 600; font-size: 14px;
    border-bottom: 1px solid var(--teams-border);
  }
  .right-scroll { flex: 1; overflow-y: auto; padding: 8px; }
  .member-row {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 8px; border-radius: 4px;
    cursor: pointer;
  }
  .member-row:hover { background: var(--teams-hover); }
  .member-name { font-size: 13px; }
  .member-role { font-size: 11px; color: var(--teams-text-tertiary); }
</style>
</head>
<body>

<!-- Left Rail -->
<div class="rail">
  <div class="rail-btn active" data-view="teams" title="Teams">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.625 8.65h-5.275V3.375a.525.525 0 0 0-.525-.525h-5.65a.525.525 0 0 0-.525.525V8.65H3.375a.525.525 0 0 0-.525.525v5.65c0 .29.235.525.525.525h5.275v5.275c0 .29.235.525.525.525h5.65c.29 0 .525-.235.525-.525v-5.275h5.275c.29 0 .525-.235.525-.525v-5.65a.525.525 0 0 0-.525-.525z"/></svg>
  </div>
  <div class="rail-btn" data-view="chat" title="Chat">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 5.9 2 10.7c0 2.4 1.15 4.55 2.95 6.1-.1.75-.45 2.15-1.45 3.1 0 0 2.25-.15 3.75-1.35.85.25 1.75.4 2.7.4.2 0 .4 0 .6-.02-.15-.45-.25-.95-.25-1.45 0-3.6 3.4-6.5 7.6-6.5.55 0 1.1.05 1.6.15C19.15 5.35 16 2 12 2zm7.6 8.5c-3.65 0-6.6 2.45-6.6 5.5s2.95 5.5 6.6 5.5c.7 0 1.35-.1 1.95-.25 1.2.95 3.05 1.1 3.05 1.1-.8-.8-1.1-2-.95-2.6 1.5-1.2 2.45-2.95 2.45-4.9 0-3.05-2.95-5.5-6.6-5.5z"/></svg>
  </div>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header" id="sidebarTitle">Teams</div>
  <div class="sidebar-search"><input type="text" placeholder="Search" id="searchInput" /></div>
  <div class="sidebar-scroll" id="sidebarContent"><div class="loading">Loading…</div></div>
</div>

<!-- Main -->
<div class="main">
  <div class="main-header">
    <div class="header-left">
      <div>
        <div class="header-title" id="headerTitle">Select a channel</div>
        <div class="header-subtitle" id="headerSubtitle"></div>
      </div>
    </div>
    <div class="header-actions">
      <div class="header-btn" id="membersBtn" title="Members">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </div>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="composer">
    <div class="composer-box">
      <textarea class="composer-input" id="composerInput" placeholder="Type a new message" rows="1"></textarea>
      <div class="composer-toolbar">
        <div class="composer-tools">
          <button class="tool-btn" title="Format">🅱️</button>
          <button class="tool-btn" title="Attach">📎</button>
          <button class="tool-btn" title="Emoji">😊</button>
        </div>
        <button class="send-btn" id="sendBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          Send
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Right Panel (Members) -->
<div class="right-panel" id="rightPanel">
  <div class="right-header">Members</div>
  <div class="right-scroll" id="memberList"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const tenant = params.get('tenant') || 'dev';
const API = location.origin.includes('localhost') ? 'http://localhost:3001' : '';
const headers = { 'Authorization': 'Bearer dev', 'X-Mock-Tenant': tenant };

let me = null;
let teams = [];
let channels = [];
let chats = [];
let users = [];
let presences = {};
let currentView = 'teams'; // 'teams' | 'chat'
let currentTeam = null;
let currentChannel = null;
let currentChat = null;
let membersPanelOpen = false;

// ── Init ──
async function init() {
  // Load me first
  const meRes = await fetch(`${API}/api/mock/graph/v1.0/me`, { headers });
  me = (await meRes.json()) || {};

  // Parallel load: teams, chats, users, presence
  const [teamsRes, chatsRes, usersRes, presRes] = await Promise.all([
    fetch(`${API}/api/mock/graph/v1.0/teams`, { headers }),
    fetch(`${API}/api/mock/graph/v1.0/me/chats`, { headers }),
    fetch(`${API}/api/mock/graph/v1.0/users?$top=999`, { headers }),
    fetch(`${API}/api/mock/graph/v1.0/communications/presences?$top=999`, { headers }),
  ]);

  const teamsData = await teamsRes.json();
  teams = teamsData.value || [];

  const chatsData = await chatsRes.json();
  chats = (chatsData.value || []).sort((a, b) => new Date(b.lastUpdatedDateTime) - new Date(a.lastUpdatedDateTime));

  const usersData = await usersRes.json();
  users = usersData.value || [];

  const presData = await presRes.json();
  (presData.value || []).forEach(p => { presences[p.id] = p.availability; });

  // Load channels for each team
  for (const team of teams) {
    const chRes = await fetch(`${API}/api/mock/graph/v1.0/teams/${team.id}/channels`, { headers });
    const chData = await chRes.json();
    team._channels = (chData.value || []).filter(c => c.membershipType !== 'private');
  }

  renderSidebar();
  setupRail();
  setupComposer();
  setupMembersPanel();

  // Auto-select first channel
  if (teams[0]?._channels?.[0]) {
    selectChannel(teams[0], teams[0]._channels[0]);
  }
}

// ── Sidebar Rendering ──
function renderSidebar() {
  const box = document.getElementById('sidebarContent');
  box.innerHTML = '';

  if (currentView === 'teams') {
    document.getElementById('sidebarTitle').textContent = 'Teams';
    renderTeamsList(box);
  } else {
    document.getElementById('sidebarTitle').textContent = 'Chat';
    renderChatList(box);
  }
}

function renderTeamsList(box) {
  const section = document.createElement('div');
  section.className = 'sidebar-section';

  for (const team of teams) {
    const teamRow = document.createElement('div');
    teamRow.className = 'team-row';

    const header = document.createElement('div');
    header.className = 'team-header';
    header.innerHTML = `
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
      <div class="team-icon">${team.displayName.slice(0,2).toUpperCase()}</div>
      <span>${escapeHtml(team.displayName)}</span>
    `;

    const channelList = document.createElement('div');
    channelList.className = 'channel-list';
    for (const ch of team._channels || []) {
      const row = document.createElement('div');
      row.className = 'channel-row';
      row.dataset.channelId = ch.id;
      row.innerHTML = `
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h-2v-6h2v6zm-1-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm5 7h-2v-3.5c0-1.1-.9-2-2-2s-2 .9-2 2V15H9V9h2v1.25c.55-.88 1.53-1.45 2.6-1.45 1.78 0 3.15 1.45 3.15 3.23V15z"/></svg>
        <span>${escapeHtml(ch.displayName)}</span>
      `;
      row.addEventListener('click', () => selectChannel(team, ch));
      channelList.appendChild(row);
    }

    header.addEventListener('click', () => {
      header.classList.toggle('collapsed');
      channelList.style.display = header.classList.contains('collapsed') ? 'none' : 'block';
    });

    teamRow.appendChild(header);
    teamRow.appendChild(channelList);
    section.appendChild(teamRow);
  }
  box.appendChild(section);
}

function renderChatList(box) {
  const section = document.createElement('div');
  section.className = 'sidebar-section';

  for (const chat of chats) {
    const other = (chat.members || []).find(m => m.id !== me.id);
    if (!other) continue;

    const row = document.createElement('div');
    row.className = 'chat-row';
    row.dataset.chatId = chat.id;

    const presence = presences[other.id] || 'Offline';
    const presenceClass = presenceToClass(presence);

    row.innerHTML = `
      <div class="chat-avatar">
        ${initials(other.displayName)}
        <div class="presence-dot ${presenceClass}"></div>
      </div>
      <div class="chat-info">
        <div class="chat-name">${escapeHtml(other.displayName)}</div>
        <div class="chat-preview" id="preview-${chat.id}">Chat</div>
      </div>
      <div class="chat-time" id="time-${chat.id}"></div>
    `;
    row.addEventListener('click', () => selectChat(chat));
    section.appendChild(row);
  }
  box.appendChild(section);

  // Load last messages for previews
  for (const chat of chats) {
    fetch(`${API}/api/mock/graph/v1.0/chats/${chat.id}/messages?$top=1&$orderby=createdDateTime desc`, { headers })
      .then(r => r.json())
      .then(data => {
        const msgs = data.value || [];
        if (msgs[0]) {
          const preview = document.getElementById(`preview-${chat.id}`);
          const timeEl = document.getElementById(`time-${chat.id}`);
          if (preview) preview.textContent = truncate(msgs[0].body?.content || '', 35);
          if (timeEl) timeEl.textContent = formatTime(msgs[0].createdDateTime);
        }
      })
      .catch(() => {});
  }
}

// ── Selection ──
async function selectChannel(team, channel) {
  currentView = 'teams';
  currentTeam = team;
  currentChannel = channel;
  currentChat = null;

  document.querySelectorAll('.channel-row').forEach(r => r.classList.remove('active'));
  const row = document.querySelector(`.channel-row[data-channel-id="${channel.id}"]`);
  if (row) row.classList.add('active');

  document.getElementById('headerTitle').textContent = `${team.displayName} › ${channel.displayName}`;
  document.getElementById('headerSubtitle').textContent = `${team._channels?.length || 0} channels`;
  document.getElementById('membersBtn').style.display = 'flex';

  await loadMessages('channel', team.id, channel.id);
  await loadChannelMembers(channel);
}

async function selectChat(chat) {
  currentView = 'chat';
  currentTeam = null;
  currentChannel = null;
  currentChat = chat;

  document.querySelectorAll('.chat-row').forEach(r => r.classList.remove('active'));
  const row = document.querySelector(`.chat-row[data-chat-id="${chat.id}"]`);
  if (row) row.classList.add('active');

  const other = (chat.members || []).find(m => m.id !== me.id);
  document.getElementById('headerTitle').textContent = other ? other.displayName : 'Chat';
  document.getElementById('headerSubtitle').textContent = '';
  document.getElementById('membersBtn').style.display = 'none';
  membersPanelOpen = false;
  document.getElementById('rightPanel').classList.remove('open');

  await loadMessages('chat', null, null, chat.id);
}

// ── Message Loading ──
async function loadMessages(type, teamId, channelId, chatId) {
  const box = document.getElementById('messages');
  box.innerHTML = '<div class="loading">Loading messages…</div>';

  let url;
  if (type === 'channel') {
    url = `${API}/api/mock/graph/v1.0/teams/${teamId}/channels/${channelId}/messages?$top=50&$orderby=createdDateTime asc`;
  } else {
    url = `${API}/api/mock/graph/v1.0/chats/${chatId}/messages?$top=50&$orderby=createdDateTime asc`;
  }

  try {
    const res = await fetch(url, { headers });
    const data = await res.json();
    const msgs = data.value || [];
    renderMessages(msgs, type, teamId, channelId, chatId);
  } catch (e) {
    box.innerHTML = '<div class="empty">Failed to load messages</div>';
  }
}

function renderMessages(msgs, type, teamId, channelId, chatId) {
  const box = document.getElementById('messages');
  box.innerHTML = '';

  if (!msgs.length) {
    box.innerHTML = '<div class="empty">No messages yet. Start the conversation!</div>';
    return;
  }

  let lastDate = null;
  for (const m of msgs) {
    const date = formatDate(m.createdDateTime);
    if (date !== lastDate) {
      const d = document.createElement('div');
      d.className = 'msg-date';
      d.textContent = date;
      box.appendChild(d);
      lastDate = date;
    }

    const isOwn = m.from?.user?.id === me.id;
    const name = m.from?.user?.displayName || 'Unknown';
    const initials = name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
    const time = formatTime(m.createdDateTime);

    const row = document.createElement('div');
    row.className = `msg-row ${isOwn ? 'own' : ''}`;
    row.dataset.msgId = m.id;

    const reactionsHtml = renderReactions(m.reactions || [], m.id, type, chatId);

    row.innerHTML = `
      <div class="msg-avatar" title="${escapeHtml(name)}">${initials}</div>
      <div class="msg-content">
        <div class="msg-name">${escapeHtml(name)} <span class="msg-time">${time}</span></div>
        <div class="msg-bubble">${escapeHtml(m.body?.content || '')}</div>
        <div class="msg-reactions">
          ${reactionsHtml}
          <span class="reaction-add" data-msg-id="${m.id}" title="Add reaction">+</span>
        </div>
      </div>
    `;

    // Reaction add click
    const addBtn = row.querySelector('.reaction-add');
    addBtn.addEventListener('click', () => toggleReaction(m.id, '👍', type, chatId));

    // Existing reaction clicks
    row.querySelectorAll('.reaction').forEach(r => {
      r.addEventListener('click', () => {
        const emoji = r.dataset.emoji;
        toggleReaction(m.id, emoji, type, chatId);
      });
    });

    box.appendChild(row);
  }

  box.scrollTop = box.scrollHeight;
}

function renderReactions(reactions, msgId, type, chatId) {
  if (!reactions.length) return '';
  return reactions.map(r => {
    const isMe = r.user?.id === me.id;
    return `<span class="reaction ${isMe ? 'me' : ''}" data-emoji="${r.reactionType}">${r.reactionType} ${r.count || 1}</span>`;
  }).join('');
}

async function toggleReaction(msgId, emoji, type, chatId) {
  if (type === 'channel') return; // PATCH not supported for channel messages
  try {
    // Fetch current message
    const res = await fetch(`${API}/api/mock/graph/v1.0/chats/${chatId}/messages/${msgId}`, { headers });
    const msg = await res.json();
    let reactions = msg.reactions || [];
    const existing = reactions.find(r => r.reactionType === emoji && r.user?.id === me.id);

    if (existing) {
      reactions = reactions.filter(r => !(r.reactionType === emoji && r.user?.id === me.id));
    } else {
      reactions.push({ reactionType: emoji, user: { id: me.id, displayName: me.displayName }, count: 1 });
    }

    await fetch(`${API}/api/mock/graph/v1.0/chats/${chatId}/messages/${msgId}`, {
      method: 'PATCH',
      headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({ reactions }),
    });

    // Refresh
    await loadMessages(type, currentTeam?.id, currentChannel?.id, currentChat?.id);
  } catch (e) {
    console.error('Reaction failed:', e);
  }
}

// ── Composer ──
function setupComposer() {
  const input = document.getElementById('composerInput');
  const btn = document.getElementById('sendBtn');

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  btn.addEventListener('click', sendMessage);

  // Auto-resize
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });
}

async function sendMessage() {
  const input = document.getElementById('composerInput');
  const text = input.value.trim();
  if (!text) return;

  let url;
  if (currentView === 'teams' && currentChannel) {
    url = `${API}/api/mock/graph/v1.0/teams/${currentTeam.id}/channels/${currentChannel.id}/messages`;
  } else if (currentView === 'chat' && currentChat) {
    url = `${API}/api/mock/graph/v1.0/chats/${currentChat.id}/messages`;
  } else {
    return;
  }

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;

  try {
    await fetch(url, {
      method: 'POST',
      headers: { ...headers, 'Content-Type': 'application/json' },
      body: JSON.stringify({ body: { contentType: 'text', content: text } }),
    });

    // Refresh messages
    if (currentView === 'teams') {
      await loadMessages('channel', currentTeam.id, currentChannel.id);
    } else {
      await loadMessages('chat', null, null, currentChat.id);
    }
  } catch (e) {
    console.error('Send failed:', e);
  } finally {
    document.getElementById('sendBtn').disabled = false;
  }
}

// ── Members Panel ──
function setupMembersPanel() {
  document.getElementById('membersBtn').addEventListener('click', () => {
    membersPanelOpen = !membersPanelOpen;
    document.getElementById('rightPanel').classList.toggle('open', membersPanelOpen);
  });
}

async function loadChannelMembers(channel) {
  const list = document.getElementById('memberList');
  list.innerHTML = '<div class="loading">Loading members…</div>';

  // For mock, derive members from team memberIds
  if (!currentTeam?._memberIds?.length) {
    list.innerHTML = '';
    return;
  }

  const memberUsers = users.filter(u => currentTeam._memberIds.includes(u.id));
  list.innerHTML = '';
  for (const u of memberUsers) {
    const presence = presences[u.id] || 'Offline';
    const row = document.createElement('div');
    row.className = 'member-row';
    row.innerHTML = `
      <div class="chat-avatar" style="width:32px;height:32px;font-size:11px;">
        ${initials(u.displayName)}
        <div class="presence-dot ${presenceToClass(presence)}" style="width:8px;height:8px;"></div>
      </div>
      <div>
        <div class="member-name">${escapeHtml(u.displayName)}</div>
        <div class="member-role">${escapeHtml(presence)}</div>
      </div>
    `;
    list.appendChild(row);
  }
}

// ── Rail Navigation ──
function setupRail() {
  document.querySelectorAll('.rail-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.rail-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentView = btn.dataset.view;
      renderSidebar();
    });
  });
}

// ── Utilities ──
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function initials(name) {
  return (name || '').split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
}

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.slice(0, len) + '…' : str;
}

function formatDate(iso) {
  const d = new Date(iso);
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return 'Today';
  if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return d.toLocaleDateString('en-GB', { weekday: 'long', month: 'short', day: 'numeric' });
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

function presenceToClass(p) {
  const map = { Available: 'presence-available', Busy: 'presence-busy', Away: 'presence-away', DoNotDisturb: 'presence-dnd', BeRightBack: 'presence-away' };
  return map[p] || 'presence-offline';
}

// Search
let searchDebounce;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(() => {
    const q = e.target.value.toLowerCase();
    if (currentView === 'teams') {
      document.querySelectorAll('.team-row').forEach(row => {
        const name = row.querySelector('.team-header span')?.textContent.toLowerCase() || '';
        row.style.display = name.includes(q) ? '' : 'none';
      });
    } else {
      document.querySelectorAll('.chat-row').forEach(row => {
        const name = row.querySelector('.chat-name')?.textContent.toLowerCase() || '';
        row.style.display = name.includes(q) ? '' : 'none';
      });
    }
  }, 150);
});
