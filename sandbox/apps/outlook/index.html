<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Outlook</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1e1e1e; color: #fff; height: 100vh; display: flex; }
  .sidebar { width: 220px; background: #2d2d2d; border-right: 1px solid #3e3e3e; display: flex; flex-direction: column; }
  .sidebar-header { padding: 16px; font-weight: 600; font-size: 16px; border-bottom: 1px solid #3e3e3e; }
  .folder-list { padding: 8px; }
  .folder-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; justify-content: space-between; }
  .folder-item:hover, .folder-item.active { background: #3e3e3e; }
  .folder-count { background: #5b5fc7; border-radius: 10px; padding: 2px 8px; font-size: 11px; }
  .main { flex: 1; display: flex; flex-direction: column; }
  .main-header { padding: 16px; border-bottom: 1px solid #3e3e3e; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .mail-list { flex: 1; overflow-y: auto; }
  .mail-item { padding: 14px 16px; border-bottom: 1px solid #2d2d2d; cursor: pointer; display: flex; gap: 12px; align-items: flex-start; }
  .mail-item:hover { background: #252525; }
  .mail-item.unread .mail-subject { font-weight: 600; }
  .mail-avatar { width: 32px; height: 32px; border-radius: 50%; background: #5b5fc7; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .mail-meta { flex: 1; min-width: 0; }
  .mail-from { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
  .mail-subject { font-size: 13px; opacity: 0.9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .mail-preview { font-size: 12px; opacity: 0.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .loading { padding: 20px; text-align: center; opacity: 0.5; font-size: 13px; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header">Outlook</div>
  <div class="folder-list">
    <div class="folder-item active" data-folder="inbox">Inbox <span class="folder-count" id="inbox-count">0</span></div>
    <div class="folder-item" data-folder="sent">Sent Items</div>
    <div class="folder-item" data-folder="drafts">Drafts</div>
  </div>
</div>
<div class="main">
  <div class="main-header">Inbox</div>
  <div class="mail-list" id="mails"><div class="loading">Loading…</div></div>
</div>
<script>
const params = new URLSearchParams(location.search);
const tenant = params.get('tenant') || 'dev';
const API = location.origin.includes('localhost') ? 'http://localhost:3001' : '';
const headers = { 'Authorization': 'Bearer dev', 'X-Mock-Tenant': tenant };

async function loadInbox() {
  const res = await fetch(`${API}/api/mock/graph/v1.0/me/messages?$top=25&$orderby=receivedDateTime desc`, { headers });
  const data = await res.json();
  const mails = data.value || [];
  document.getElementById('inbox-count').textContent = mails.filter(m => !m.isRead).length;
  const box = document.getElementById('mails');
  box.innerHTML = '';
  for (const m of mails) {
    const fromName = m.from?.emailAddress?.name || 'Unknown';
    const initials = fromName.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
    const div = document.createElement('div');
    div.className = 'mail-item' + (m.isRead ? '' : ' unread');
    div.innerHTML = `
      <div class="mail-avatar">${initials}</div>
      <div class="mail-meta">
        <div class="mail-from">${fromName}</div>
        <div class="mail-subject">${m.subject || '(No subject)'}</div>
        <div class="mail-preview">${m.bodyPreview || ''}</div>
      </div>`;
    box.appendChild(div);
  }
  if (!mails.length) box.innerHTML = '<div class="loading">Your inbox is empty</div>';
}

loadInbox().catch(console.error);
</script>
</body>
</html>
